<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 내역 | new-cafe</title>
    <link rel="stylesheet" href="../css/variables.css?v=20260714-deploy-fix" />
    <link rel="stylesheet" href="./list.css?v=20260714-deploy-fix" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">new-cafe</a>
        <nav class="header-nav" aria-label="주요 메뉴">
          <a href="../menus/list.html">메뉴</a>
          <a href="../basket/list.html">장바구니 <span id="cartCount">0</span></a>
          <a href="./list.html" aria-current="page">주문 내역</a>
          <a href="../my/index.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container orders-page">
      <section class="page-heading">
        <p class="eyebrow">주문</p>
        <h1>주문 내역</h1>
        <p>최근 주문과 픽업 상태를 한눈에 확인합니다.</p>
      </section>

      <section class="summary-grid" aria-label="주문 요약">
        <article class="summary-card">
          <span>전체 주문</span>
          <strong id="totalOrders">0</strong>
        </article>
        <article class="summary-card">
          <span>진행 중</span>
          <strong id="activeOrders">0</strong>
        </article>
        <article class="summary-card">
          <span>총 결제 금액</span>
          <strong id="totalAmount">0원</strong>
        </article>
      </section>

      <section class="orders-panel">
        <div class="panel-heading">
          <h2>최근 주문</h2>
          <select id="statusFilter" aria-label="주문 상태 필터">
            <option value="all">전체</option>
            <option value="preparing">준비 중</option>
            <option value="ready">픽업 가능</option>
            <option value="completed">완료</option>
          </select>
        </div>

        <div id="orderList" class="order-list" aria-live="polite"></div>
        <p id="emptyMessage" class="empty-message" hidden>표시할 주문 내역이 없습니다.</p>
      </section>
    </main>

    <script src="../js/utils.js?v=20260715-return-to-fix"></script>
    <script src="./list.js?v=20260715-return-to-fix"></script>
  </body>
</html>
