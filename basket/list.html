<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | new-cafe</title>
    <link rel="stylesheet" href="../css/variables.css?v=20260714-deploy-fix" />
    <link rel="stylesheet" href="./list.css?v=20260714-deploy-fix" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">new-cafe</a>
        <nav class="header-nav" aria-label="주요 메뉴">
          <a href="../menus/list.html">메뉴</a>
          <a href="./list.html" aria-current="page">장바구니 <span id="cartCount">0</span></a>
          <a href="../orders/list.html">주문 내역</a>
          <a href="../my/index.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container basket-page">
      <div class="basket-heading">
        <p class="eyebrow">내 주문</p>
        <h1>장바구니</h1>
      </div>

      <section class="basket-layout" aria-live="polite">
        <div id="basketItems" class="basket-items"></div>
        <aside class="basket-summary">
          <h2>주문 요약</h2>
          <div class="summary-row">
            <span>수량</span>
            <span id="summaryCount">0</span>
          </div>
          <div class="summary-row summary-total">
            <span>합계</span>
            <span id="summaryTotal">0원</span>
          </div>
          <button id="clearButton" class="clear-button" type="button">장바구니 비우기</button>
          <button id="checkoutButton" class="checkout-button" type="button">결제하기</button>
        </aside>
      </section>

      <p id="emptyMessage" class="empty-message" hidden>장바구니가 비어 있습니다. 메뉴에서 원하는 음료를 담아보세요.</p>
    </main>

    <script src="../js/data.js?v=20260714-deploy-fix"></script>
    <script src="../js/utils.js?v=20260715-return-to-fix"></script>
    <script src="./list.js?v=20260714-deploy-fix"></script>
  </body>
</html>
