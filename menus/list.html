<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu | new-cafe</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">new-cafe</a>
        <nav class="header-nav" aria-label="Main navigation">
          <a href="./list.html" aria-current="page">Menu</a>
          <a href="../basket/list.html">Basket <span id="cartCount">0</span></a>
          <a href="../orders/list.html">Orders</a>
        </nav>
      </div>
    </header>

    <main class="menu-page">
      <section class="menu-hero">
        <div class="container menu-hero-inner">
          <p class="eyebrow">Cafe Menu</p>
          <h1>Choose your next cup</h1>
          <p class="hero-copy">
            Browse coffee, tea, non-coffee drinks, and desserts prepared for a simple cafe ordering flow.
          </p>
        </div>
      </section>

      <section class="container menu-tools" aria-label="Menu filters">
        <label class="search-field">
          <span class="sr-only">Search menu</span>
          <input id="searchInput" type="search" placeholder="Search menu" autocomplete="off" />
        </label>
        <div id="categoryTabs" class="category-tabs" role="tablist" aria-label="Menu categories"></div>
      </section>

      <section class="container menu-results" aria-live="polite">
        <div class="result-heading">
          <h2 id="resultTitle">All menus</h2>
          <p id="resultCount">0 items</p>
        </div>
        <div id="menuGrid" class="menu-grid"></div>
        <p id="emptyMessage" class="empty-message" hidden>No matching menu found.</p>
      </section>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
