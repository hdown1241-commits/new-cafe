<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 관리 - 관리자</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <span class="admin-sidebar__brand-mark">☕</span>
        New Cafe Admin
      </div>
      <nav class="admin-sidebar__nav">
        <a href="../index.html"><span class="icon">📊</span>대시보드</a>
        <a href="list.html" class="is-active"><span class="icon">🍰</span>메뉴 관리</a>
        <a href="../orders/list.html"><span class="icon">🧾</span>주문 관리</a>
      </nav>
      <p class="admin-sidebar__foot">© New Cafe</p>
    </aside>

    <div class="admin-content">
      <header class="admin-topbar">
        <div class="admin-topbar__heading">
          <span class="admin-topbar__eyebrow">Menu Management</span>
          <h1 class="admin-topbar__title">메뉴 관리</h1>
        </div>
        <a href="create.html" class="btn btn--primary">+ 메뉴 추가</a>
      </header>

      <main class="admin-main">
        <div class="stat-grid" id="statGrid"></div>

        <div class="page-title-row">
          <h2 class="page-title">전체 메뉴</h2>
        </div>

        <div class="filter-bar" id="categoryFilter">
          <button type="button" class="filter-chip is-active" data-category="all">전체</button>
        </div>

        <div class="menu-table-wrap">
          <table class="menu-table">
            <thead>
              <tr>
                <th></th>
                <th>메뉴</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>시그니처</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="menuTableBody"></tbody>
          </table>
          <p class="empty-state" id="emptyState" hidden>등록된 메뉴가 없습니다.</p>
        </div>
      </main>
    </div>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script>
    if (!window.CafeUtils.requireAdminAccess()) {
      location.href = "../../menus/list.html";
    }
  </script>
  <script src="list.js"></script>
</body>
</html>
