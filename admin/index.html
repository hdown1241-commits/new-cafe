<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 대시보드 | new-cafe</title>
    <script>
      window.NEW_CAFE_BASE = location.pathname.startsWith("/new-cafe/") ? "/new-cafe" : "";
      document.write(`<link rel="stylesheet" href="${window.NEW_CAFE_BASE}/css/variables.css?v=20260715-live-fix" />`);
      document.write(`<link rel="stylesheet" href="${window.NEW_CAFE_BASE}/admin/index.css?v=20260715-live-fix" />`);
    </script>
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <div class="admin-sidebar__brand">
          <span class="admin-sidebar__brand-mark">관리</span>
          new-cafe 관리자
        </div>
        <nav class="admin-sidebar__nav" aria-label="관리자 메뉴">
          <a href="./index.html" class="is-active"><span class="icon">관리</span>대시보드</a>
          <a href="./menus/list.html"><span class="icon">메뉴</span>메뉴 관리</a>
          <a href="./orders/list.html"><span class="icon">주문</span>주문 관리</a>
        </nav>
        <p class="admin-sidebar__foot">new-cafe 운영 관리</p>
      </aside>

      <div class="admin-content">
        <header class="admin-topbar">
          <div class="admin-topbar__heading">
            <span class="admin-topbar__eyebrow">전체 현황</span>
            <h1 class="admin-topbar__title">대시보드</h1>
          </div>
          <a href="../index.html" class="btn btn--ghost">고객 화면</a>
        </header>

        <main class="admin-main">
          <section id="statGrid" class="stat-grid" aria-label="대시보드 통계"></section>

          <section class="dashboard-grid">
            <article class="dashboard-panel">
              <div class="panel-heading">
                <div>
                  <p class="panel-eyebrow">메뉴</p>
                  <h2>메뉴 현황</h2>
                </div>
                <a href="./menus/list.html" class="btn btn--primary">메뉴 관리</a>
              </div>
              <div id="menuSummary" class="summary-list"></div>
            </article>

            <article class="dashboard-panel">
              <div class="panel-heading">
                <div>
                  <p class="panel-eyebrow">주문</p>
                  <h2>최근 주문</h2>
                </div>
                <a href="./orders/list.html" class="btn btn--primary">주문 관리</a>
              </div>
              <div id="recentOrders" class="order-list"></div>
            </article>
          </section>

          <section class="quick-actions" aria-label="빠른 작업">
            <a href="./menus/create.html" class="quick-action">
              <span>메뉴 추가</span>
              <strong>새 메뉴를 등록합니다</strong>
            </a>
            <a href="./menus/list.html" class="quick-action">
              <span>메뉴 수정</span>
              <strong>판매 상태와 가격을 조정합니다</strong>
            </a>
            <a href="./orders/list.html" class="quick-action">
              <span>주문</span>
              <strong>주문 상태를 확인합니다</strong>
            </a>
          </section>
        </main>
      </div>
    </div>

    <script>
      document.write(`<script src="${window.NEW_CAFE_BASE}/js/data.js?v=20260715-live-fix"><\/script>`);
      document.write(`<script src="${window.NEW_CAFE_BASE}/js/utils.js?v=20260715-live-fix"><\/script>`);
    </script>
    <script>
      if (!window.CafeUtils.requireAdminAccess()) {
        location.href = `${window.NEW_CAFE_BASE}/index.html`;
      }
    </script>
    <script>
      document.write(`<script src="${window.NEW_CAFE_BASE}/admin/index.js?v=20260715-live-fix"><\/script>`);
    </script>
  </body>
</html>
